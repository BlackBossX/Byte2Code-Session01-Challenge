##############################################################
#  Nginx configuration for Workshop Submission Dashboard
#  Place at: /etc/nginx/sites-available/workshop
##############################################################

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;   # matches any hostname / bare IP

    root /var/www/workshop;
    index index.html;

    # ── Logging ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/workshop.access.log;
    error_log  /var/log/nginx/workshop.error.log;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin"         always;

    # ── PHP (API endpoints) ───────────────────────────────────────────────
    location /api/ {
        try_files $uri =404;
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma        "no-cache";
    }

    # ── Static frontend ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Deny dot-files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Deny direct access to PHP source (belt-and-suspenders) ───────────
    location ~ \.php$ {
        # Only api/ is served above; any other .php is blocked
        deny all;
    }
}
