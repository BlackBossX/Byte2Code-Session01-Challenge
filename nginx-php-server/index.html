<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop Submissions Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --bg:          #0d1117;
      --bg-card:     #161b22;
      --bg-hover:    #1c2333;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --accent:      #58a6ff;
      --accent-dim:  #1f3a5c;
      --green:       #3fb950;
      --green-dim:   #1a3a28;
      --yellow:      #d29922;
      --yellow-dim:  #352a11;
      --red:         #f85149;
      --rank-1:      #ffd700;
      --rank-2:      #c0c0c0;
      --rank-3:      #cd7f32;
      --radius:      8px;
      --mono:        'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    [data-theme="light"] {
      --bg:          #f0f2f5;
      --bg-card:     #ffffff;
      --bg-hover:    #f6f8fa;
      --border:      #d0d7de;
      --text:        #1f2328;
      --text-muted:  #656d76;
      --accent:      #0969da;
      --accent-dim:  #ddeeff;
      --green:       #1a7f37;
      --green-dim:   #dafbe1;
      --yellow-dim:  #fff8c5;
      --rank-1:      #b8860b;
      --rank-2:      #696969;
      --rank-3:      #8b4513;
    }

    /* ── Base ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Top bar ───────────────────────────────────────────────────────── */
    .topbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.5px;
      white-space: nowrap;
      text-decoration: none;
      color: var(--text);
    }

    .topbar-brand .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(88,166,255,0.45));
      transition: filter 0.3s;
    }

    .topbar-brand .logo-wrap:hover {
      filter: drop-shadow(0 0 14px rgba(88,166,255,0.7));
    }

    .topbar-brand .logo-wrap img {
      height: 36px;
      width: auto;
      display: block;
    }

    .topbar-brand .brand-divider {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 2px;
    }

    .topbar-brand .brand-title {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .topbar-brand .brand-title .brand-main {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent) 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-brand .brand-title .brand-sub {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      -webkit-text-fill-color: var(--text-muted);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Stat cards ────────────────────────────────────────────────────── */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .stat-value.accent  { color: var(--accent); }
    .stat-value.green   { color: var(--green); }
    .stat-value.yellow  { color: var(--yellow); }

    /* ── Cards ─────────────────────────────────────────────────────────── */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-header .title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Leaderboard ───────────────────────────────────────────────────── */
    .lb-item {
      display: grid;
      grid-template-columns: 28px 80px 1fr 40px;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .lb-item:last-child { border-bottom: none; }
    .lb-item:hover { background: var(--bg-hover); }

    .lb-rank {
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text-muted);
      text-align: center;
    }

    .lb-rank.r1 { color: var(--rank-1); }
    .lb-rank.r2 { color: var(--rank-2); }
    .lb-rank.r3 { color: var(--rank-3); }

    .lb-team {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

    .lb-bar-wrap {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .lb-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .lb-count {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      color: var(--text);
    }

    /* ── File table ────────────────────────────────────────────────────── */
    .file-table { width: 100%; border-collapse: collapse; }

    .file-table thead th {
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      position: sticky;
      top: 0;
      white-space: nowrap;
    }

    .file-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    .file-table tbody tr:last-child { border-bottom: none; }
    .file-table tbody tr:hover { background: var(--bg-hover); }

    .file-table tbody tr.recent-file {
      background: var(--green-dim);
    }

    .file-table tbody tr.recent-file:hover {
      background: color-mix(in srgb, var(--green-dim) 70%, var(--bg-hover));
    }

    .file-table td {
      padding: 10px 14px;
      vertical-align: middle;
    }

    .td-team {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .td-filename {
      font-family: var(--mono);
      font-size: 12px;
      word-break: break-all;
    }

    .td-size {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      text-align: right;
    }

    .td-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .recent-badge {
      display: inline-block;
      background: var(--green);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 99px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-left: 6px;
      vertical-align: middle;
    }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .dl-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Controls ──────────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
    }

    .search-wrap .bi {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    .search-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 6px 10px 6px 32px;
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .filter-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    /* ── Buttons ───────────────────────────────────────────────────────── */
    .btn-icon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--text-muted);
      text-decoration: none;
    }

    .btn-icon:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .btn-icon.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-icon.primary:hover {
      opacity: 0.85;
      color: #fff;
    }

    /* ── Status dot ────────────────────────────────────────────────────── */
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Misc ──────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state i { font-size: 32px; margin-bottom: 10px; display: block; }

    .refresh-info {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .error-banner {
      background: color-mix(in srgb, var(--red) 15%, transparent);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--red);
      display: none;
    }

    .table-scroll {
      max-height: 480px;
      overflow-y: auto;
    }

    .table-scroll::-webkit-scrollbar { width: 6px; }
    .table-scroll::-webkit-scrollbar-track { background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
    }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    .content-wrap {
      padding: 20px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Transition overlay ────────────────────────────────────────────── */
    #refresh-flash {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: 999;
    }

    #refresh-flash.active { transform: scaleX(1); }

    /* countdown ring */
    .countdown-ring { position: relative; width: 28px; height: 28px; }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring .ring-bg  { fill: none; stroke: var(--border); stroke-width: 2.5; }
    .countdown-ring .ring-fg  { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-dasharray: 69.1; transition: stroke-dashoffset 1s linear; }
    .countdown-ring .ring-num { position: absolute; inset: 0; display: grid; place-items: center; font-size: 9px; font-family: var(--mono); font-weight: 700; }

    /* ── First 3 Submitters Podium ─────────────────────────────────────── */
    .podium-section {
      margin-bottom: 24px;
    }

    .podium-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.2px;
    }

    .podium-header .podium-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #b8860b 0%, #ffd700 50%, #b8860b 100%);
      color: #1a1100;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 0 14px rgba(255,215,0,0.3);
    }

    .podium-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    @media (max-width: 700px) {
      .podium-grid { grid-template-columns: 1fr; }
    }

    .podium-card {
      border-radius: var(--radius);
      padding: 20px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      border: 1px solid var(--border);
    }

    .podium-card:hover {
      transform: translateY(-2px);
    }

    .podium-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.07;
      pointer-events: none;
    }

    .podium-card.rank-1 {
      background: linear-gradient(135deg, #1a1400 0%, var(--bg-card) 60%);
      border-color: #7a5800;
      box-shadow: 0 0 24px rgba(255, 215, 0, 0.12), inset 0 1px 0 rgba(255,215,0,0.15);
    }
    .podium-card.rank-1:hover { box-shadow: 0 0 32px rgba(255, 215, 0, 0.22), inset 0 1px 0 rgba(255,215,0,0.2); }

    .podium-card.rank-2 {
      background: linear-gradient(135deg, #111318 0%, var(--bg-card) 60%);
      border-color: #4a4f5a;
      box-shadow: 0 0 18px rgba(192, 192, 192, 0.1), inset 0 1px 0 rgba(192,192,192,0.12);
    }
    .podium-card.rank-2:hover { box-shadow: 0 0 28px rgba(192, 192, 192, 0.18), inset 0 1px 0 rgba(192,192,192,0.18); }

    .podium-card.rank-3 {
      background: linear-gradient(135deg, #120a04 0%, var(--bg-card) 60%);
      border-color: #5a3010;
      box-shadow: 0 0 18px rgba(205, 127, 50, 0.1), inset 0 1px 0 rgba(205,127,50,0.12);
    }
    .podium-card.rank-3:hover { box-shadow: 0 0 28px rgba(205, 127, 50, 0.18), inset 0 1px 0 rgba(205,127,50,0.18); }

    /* Light theme podium overrides */
    [data-theme="light"] .podium-card.rank-1 {
      background: linear-gradient(135deg, #fffae8 0%, #fff 60%);
      border-color: #e8c700;
      box-shadow: 0 0 20px rgba(200,160,0,0.15);
    }
    [data-theme="light"] .podium-card.rank-2 {
      background: linear-gradient(135deg, #f5f5f5 0%, #fff 60%);
      border-color: #b0b8c1;
      box-shadow: 0 0 14px rgba(120,130,140,0.12);
    }
    [data-theme="light"] .podium-card.rank-3 {
      background: linear-gradient(135deg, #fff3ea 0%, #fff 60%);
      border-color: #c87040;
      box-shadow: 0 0 14px rgba(180,100,50,0.1);
    }

    .podium-medal {
      font-size: 38px;
      line-height: 1;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    .podium-info {
      flex: 1;
      min-width: 0;
    }

    .podium-rank-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .podium-card.rank-1 .podium-rank-label { color: #d4a800; }
    .podium-card.rank-2 .podium-rank-label { color: #9aa0aa; }
    .podium-card.rank-3 .podium-rank-label { color: #c07830; }

    .podium-team {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .podium-card.rank-1 .podium-team { color: #ffd700; }
    .podium-card.rank-2 .podium-team { color: #d0d7de; }
    .podium-card.rank-3 .podium-team { color: #cd9060; }

    [data-theme="light"] .podium-card.rank-1 .podium-team { color: #9a7000; }
    [data-theme="light"] .podium-card.rank-2 .podium-team { color: #505860; }
    [data-theme="light"] .podium-card.rank-3 .podium-team { color: #7a4010; }

    .podium-filename {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .podium-time {
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.75;
    }

    .podium-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 28px;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="refresh-flash"></div>

<!-- ── Top bar ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="logo-wrap">
      <img src="../logos/Byte2Cloud.png" alt="Byte2Cloud" />
    </div>
    <div class="brand-divider"></div>
    <div class="brand-title">
      <span class="brand-main">Workshop Dashboard</span>
      <span class="brand-sub">Byte2Cloud · Live Monitor</span>
    </div>
  </div>

  <div class="topbar-right">
    <div class="refresh-info">
      <span class="status-dot"></span>
      <span id="last-refresh">–</span>
    </div>

    <div class="countdown-ring" title="Next refresh">
      <svg width="28" height="28" viewBox="0 0 24 24">
        <circle class="ring-bg" cx="12" cy="12" r="11" />
        <circle class="ring-fg" id="ring-fg" cx="12" cy="12" r="11" />
      </svg>
      <div class="ring-num" id="ring-num">5</div>
    </div>

    <button class="btn-icon" id="btn-theme" title="Toggle dark/light mode">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>

    <button class="btn-icon primary" id="btn-csv">
      <i class="bi bi-download"></i> Export CSV
    </button>
  </div>
</header>

<!-- ── Main content ────────────────────────────────────────────────────── -->
<main class="content-wrap">

  <!-- Error banner -->
  <div class="error-banner mb-3" id="error-banner">
    <i class="bi bi-exclamation-triangle me-2"></i>
    <span id="error-text"></span>
  </div>

  <!-- Stats row -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-label"><i class="bi bi-files me-1"></i>Total Submissions</div>
        <div class="stat-value accent" id="stat-total">–</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-label"><i class="bi bi-people me-1"></i>Active Teams</div>
        <div class="stat-value green" id="stat-teams">–</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-label"><i class="bi bi-clock-history me-1"></i>Last 5 min</div>
        <div class="stat-value yellow" id="stat-recent">–</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-label"><i class="bi bi-trophy me-1"></i>Top Team</div>
        <div class="stat-value accent" id="stat-top" style="font-size:20px">–</div>
      </div>
    </div>
  </div>

  <!-- First 3 Submitters -->
  <div class="podium-section" id="podium-section">
    <div class="podium-header">
      <span class="podium-badge">🏆 First Submitters</span>
      <span style="color:var(--text-muted);font-size:12px;font-weight:400;">Earliest unique team submission per team</span>
    </div>
    <div class="podium-grid" id="podium-body">
      <div class="podium-empty"><i class="bi bi-hourglass me-2"></i>Loading…</div>
    </div>
  </div>

  <!-- Main grid -->
  <div class="main-grid">

    <!-- Leaderboard -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="title"><i class="bi bi-bar-chart-fill text-warning"></i> Leaderboard</div>
          <small class="text-muted">by submissions</small>
        </div>
        <div style="max-height: 560px; overflow-y: auto;" class="table-scroll">
          <div id="leaderboard-body">
            <div class="empty-state"><i class="bi bi-hourglass"></i>Loading…</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Latest uploads -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="title"><i class="bi bi-lightning-fill text-info"></i> Latest Uploads</div>
          <div class="d-flex gap-2 flex-wrap">
            <div class="search-wrap">
              <i class="bi bi-search"></i>
              <input type="search" class="search-input" id="search-input" placeholder="Search files…" />
            </div>
            <select class="filter-select" id="team-filter">
              <option value="">All teams</option>
            </select>
          </div>
        </div>
        <div class="table-scroll">
          <table class="file-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Team</th>
                <th>Filename</th>
                <th class="text-end">Size</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="files-body">
              <tr><td colspan="5"><div class="empty-state"><i class="bi bi-hourglass"></i>Loading…</div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="panel-header" style="border-top:1px solid var(--border); border-bottom:none; font-size:11px; color:var(--text-muted);">
          Showing <span id="showing-count">–</span> of <span id="total-count">–</span> files
        </div>
      </div>
    </div>

  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────────────
let allFiles    = [];
let countdown   = 5;
let timer       = null;
let lastData    = null;
const INTERVAL  = 5;
const ringFg    = document.getElementById('ring-fg');
const ringNum   = document.getElementById('ring-num');
const DASH      = 69.1;

// ── Theme toggle ─────────────────────────────────────────────────────────
const html      = document.documentElement;
const themeIcon = document.getElementById('theme-icon');

function setTheme(t) {
  html.setAttribute('data-theme', t);
  localStorage.setItem('ws-theme', t);
  themeIcon.className = t === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
}

document.getElementById('btn-theme').addEventListener('click', () => {
  setTheme(html.dataset.theme === 'dark' ? 'light' : 'dark');
});

setTheme(localStorage.getItem('ws-theme') || 'dark');

// ── Countdown ring ───────────────────────────────────────────────────────
function updateRing(sec) {
  const pct    = sec / INTERVAL;
  ringFg.style.strokeDashoffset = DASH * (1 - pct);
  ringNum.textContent = sec;
}

// ── Fetch data ───────────────────────────────────────────────────────────
async function fetchData() {
  const flash = document.getElementById('refresh-flash');
  flash.classList.add('active');

  try {
    const res  = await fetch('api/submissions?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (!data.ok) throw new Error('API error');

    lastData = data;
    allFiles = data.all_files || [];

    renderStats(data);
    renderLeaderboard(data.leaderboard, data.total);
    renderPodium(allFiles);
    populateTeamFilter(data.team_counts);
    applyFilters();
    updateTimestamp(data.time_fmt);
    hideError();

  } catch (e) {
    showError('Could not load data: ' + e.message);
  }

  setTimeout(() => flash.classList.remove('active'), 350);
}

// ── Render stats ─────────────────────────────────────────────────────────
function renderStats(data) {
  document.getElementById('stat-total').textContent  = data.total;
  const active = Object.values(data.team_counts).filter(c => c > 0).length;
  document.getElementById('stat-teams').textContent  = active + '/25';
  const recent = (data.latest || []).filter(f => f.recent).length;
  document.getElementById('stat-recent').textContent = recent;
  const top = data.leaderboard?.[0];
  document.getElementById('stat-top').textContent    = top ? top.team : '–';
}

// ── Render first-3 submitters podium ─────────────────────────────────────
function renderPodium(files) {
  const body = document.getElementById('podium-body');
  if (!files || files.length === 0) {
    body.innerHTML = '<div class="podium-empty"><i class="bi bi-inbox me-2"></i>No submissions yet</div>';
    return;
  }

  // Sort all files oldest-first, then pick the FIRST file per team
  const sorted = [...files].sort((a, b) => {
    // mtime is a unix timestamp; fall back to string comparison
    const ta = a.mtime || 0;
    const tb = b.mtime || 0;
    return ta - tb;
  });

  const seen = new Set();
  const first3 = [];
  for (const f of sorted) {
    if (!seen.has(f.team)) {
      seen.add(f.team);
      first3.push(f);
    }
    if (first3.length === 3) break;
  }

  if (first3.length === 0) {
    body.innerHTML = '<div class="podium-empty"><i class="bi bi-inbox me-2"></i>No submissions yet</div>';
    return;
  }

  const medals  = ['🥇', '🥈', '🥉'];
  const labels  = ['1st Place', '2nd Place', '3rd Place'];
  const rankCls = ['rank-1', 'rank-2', 'rank-3'];

  // Pad to 3 slots so the grid always shows 3 columns
  while (first3.length < 3) first3.push(null);

  body.innerHTML = first3.map((f, i) => {
    if (!f) {
      return `
        <div class="podium-card ${rankCls[i]}" style="opacity:0.35;">
          <div class="podium-medal">${medals[i]}</div>
          <div class="podium-info">
            <div class="podium-rank-label">${labels[i]}</div>
            <div class="podium-team">—</div>
            <div class="podium-filename">No submission yet</div>
          </div>
        </div>`;
    }
    return `
      <div class="podium-card ${rankCls[i]}">
        <div class="podium-medal">${medals[i]}</div>
        <div class="podium-info">
          <div class="podium-rank-label">${labels[i]}</div>
          <div class="podium-team" title="${esc(f.team)}">${esc(f.team)}</div>
          <div class="podium-filename" title="${esc(f.filename)}"><i class="bi bi-file-earmark-text me-1"></i>${esc(f.filename)}</div>
          <div class="podium-time"><i class="bi bi-clock me-1"></i>${esc(f.mtime_fmt)} &bull; ${esc(f.date_fmt)}</div>
        </div>
      </div>`;
  }).join('');
}

// ── Render leaderboard ───────────────────────────────────────────────────
function renderLeaderboard(lb, total) {
  const body = document.getElementById('leaderboard-body');
  if (!lb || lb.length === 0) {
    body.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i>No data</div>';
    return;
  }
  const max = lb[0]?.count || 1;
  body.innerHTML = lb.map((item, i) => {
    const pct   = max > 0 ? Math.round((item.count / max) * 100) : 0;
    const rankCls = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    return `
      <div class="lb-item">
        <div class="lb-rank ${rankCls}">${medal}</div>
        <div class="lb-team">${esc(item.team)}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
        <div class="lb-count">${item.count}</div>
      </div>`;
  }).join('');
}

// ── Populate team filter ──────────────────────────────────────────────────
let filterPopulated = false;
function populateTeamFilter(counts) {
  if (filterPopulated) return;
  filterPopulated = true;
  const sel = document.getElementById('team-filter');
  Object.keys(counts).sort().forEach(team => {
    const opt = document.createElement('option');
    opt.value = team;
    opt.textContent = team;
    sel.appendChild(opt);
  });
}

// ── Filters ──────────────────────────────────────────────────────────────
function applyFilters() {
  const q    = document.getElementById('search-input').value.trim().toLowerCase();
  const team = document.getElementById('team-filter').value;

  let filtered = allFiles;
  if (team)  filtered = filtered.filter(f => f.team === team);
  if (q)     filtered = filtered.filter(f =>
    f.filename.toLowerCase().includes(q) || f.team.toLowerCase().includes(q)
  );

  renderFiles(filtered.slice(0, 50));
  document.getElementById('showing-count').textContent = Math.min(filtered.length, 50);
  document.getElementById('total-count').textContent   = allFiles.length;
}

document.getElementById('search-input').addEventListener('input', applyFilters);
document.getElementById('team-filter').addEventListener('change', applyFilters);

// ── Render file table ─────────────────────────────────────────────────────
function renderFiles(files) {
  const body = document.getElementById('files-body');
  if (!files || files.length === 0) {
    body.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="bi bi-inbox"></i>No files found</div></td></tr>`;
    return;
  }
  body.innerHTML = files.map(f => {
    const dlUrl = `api/download?team=${encodeURIComponent(f.team)}&filename=${encodeURIComponent(f.filename)}`;
    const badge = f.recent ? `<span class="recent-badge">new</span>` : '';
    return `
      <tr class="${f.recent ? 'recent-file' : ''}">
        <td class="td-time">${esc(f.mtime_fmt)}<br><span style="font-size:10px;color:var(--text-muted)">${esc(f.date_fmt)}</span></td>
        <td class="td-team">${esc(f.team)}</td>
        <td class="td-filename">${esc(f.filename)}${badge}</td>
        <td class="td-size">${esc(f.size_fmt)}</td>
        <td><a href="${dlUrl}" class="dl-btn" download><i class="bi bi-download"></i>DL</a></td>
      </tr>`;
  }).join('');
}

// ── CSV Export ────────────────────────────────────────────────────────────
document.getElementById('btn-csv').addEventListener('click', () => {
  if (!allFiles.length) return;
  const rows = [['Team', 'Filename', 'Size (bytes)', 'Size', 'Upload Time', 'Date']];
  allFiles.forEach(f => {
    rows.push([f.team, f.filename, f.size, f.size_fmt, f.mtime_fmt, f.date_fmt]);
  });
  const csv  = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'submissions-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
});

// ── Timestamp ─────────────────────────────────────────────────────────────
function updateTimestamp(t) {
  document.getElementById('last-refresh').textContent = 'Refreshed ' + t;
}

// ── Error handling ────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-banner');
  document.getElementById('error-text').textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

// ── Escape HTML ───────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Auto-refresh loop ─────────────────────────────────────────────────────
function startTimer() {
  countdown = INTERVAL;
  updateRing(countdown);
  clearInterval(timer);
  timer = setInterval(() => {
    countdown--;
    updateRing(countdown);
    if (countdown <= 0) {
      clearInterval(timer);
      fetchData().then(startTimer);
    }
  }, 1000);
}

// ── Boot ──────────────────────────────────────────────────────────────────
fetchData().then(startTimer);
</script>
</body>
</html>
